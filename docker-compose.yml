version: '3.9'

services:
  backend:
    build: ./backend
    container_name: effiong-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    restart: unless-stopped
    networks:
      - effiong-network

  frontend:
    build: ./frontend
    container_name: effiong-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - effiong-network

networks:
  effiong-network:
    driver: bridge
